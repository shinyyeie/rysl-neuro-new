<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>RYSL NEURO</title>
<style>
:root{--bg:#f5f0f5;--card:#fff;--text:#2d1b2e;--sub:#9e8d9f;--pink:#e84393;--pink2:#fd79a8;--border:#f0e0ee;--r:24px;--rr:40px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;height:100vh;overflow:hidden;font-size:14px}
.app{display:flex;flex-direction:column;height:100vh;max-width:550px;margin:0 auto}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--card);border-bottom:1px solid var(--border)}
.logo{font-size:18px;font-weight:600;color:var(--text)}.logo span{color:var(--pink)}
.ibtn{width:40px;height:40px;border-radius:50%;background:var(--bg);border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s}
.ibtn:hover{background:var(--border)}
.ann{background:linear-gradient(135deg,#fce4ec,#f8bbd0);padding:14px 20px;text-align:center;font-size:11px;color:var(--pink);font-weight:500;letter-spacing:0.5px;border-radius:0 0 var(--rr) var(--rr);margin:0 12px}
.content{flex:1;overflow-y:auto;padding:16px}
.group-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:8px 0;cursor:pointer;transition:.2s}
.group-card:hover{border-color:var(--pink);box-shadow:0 4px 20px rgba(232,67,147,0.08)}
.group-card h4{font-size:15px;font-weight:600}.group-card p{font-size:11px;color:var(--sub);margin-top:3px}
.group-card.ai{border:2px solid var(--pink);background:#fff5f8}
.btn-c{width:100%;padding:14px;background:var(--card);border:2px dashed var(--border);color:var(--pink);border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:500;margin-bottom:8px;transition:.2s}
.btn-c:hover{border-color:var(--pink);background:#fff5f8}
.chat-header{display:flex;align-items:center;padding:14px 18px;background:var(--card);border-bottom:1px solid var(--border);gap:10px}
.back-btn{color:var(--pink);cursor:pointer;font-size:14px;background:none;border:none;font-weight:500;padding:6px 12px;border-radius:20px;transition:.2s}
.back-btn:hover{background:var(--bg)}
.chat-name{font-size:15px;font-weight:600;flex:1}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:12px 16px;border-radius:20px;font-size:13px;line-height:1.5;word-break:break-word;position:relative}
.msg.user{background:var(--pink);align-self:flex-end;border-bottom-right-radius:6px;color:#fff}
.msg.ai{background:var(--card);align-self:flex-start;border-bottom-left-radius:6px;border:1px solid var(--border)}
.msg .sender{font-size:10px;color:var(--pink);margin-bottom:3px;font-weight:600}
.msg .copy{position:absolute;top:6px;right:8px;background:rgba(0,0,0,0.04);border:none;color:var(--sub);cursor:pointer;font-size:10px;padding:4px 8px;border-radius:12px;opacity:0}
.msg:hover .copy{opacity:1}
.input-area{display:flex;gap:8px;padding:14px 16px;background:var(--card);border-top:1px solid var(--border)}
.input-area input{flex:1;padding:12px 16px;background:var(--bg);border:2px solid var(--border);border-radius:30px;color:var(--text);font-size:13px;outline:none;transition:.2s}
.input-area input:focus{border-color:var(--pink)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--pink);border:none;color:#fff;font-size:20px;cursor:pointer;transition:.2s}
.send-btn:hover{background:#c2185b}
.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}
.typing span{width:6px;height:6px;background:var(--pink);border-radius:50%;animation:ty 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,60%,100%{opacity:0.2}30%{opacity:1}}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center}
.modal.on{display:flex}
.modal-box{background:var(--card);border-radius:var(--r);padding:28px 24px;width:90%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,0.1)}
.modal-title{font-size:18px;font-weight:600;margin-bottom:14px;color:var(--text)}
.modal-input{width:100%;padding:14px;background:var(--bg);border:2px solid var(--border);border-radius:16px;color:var(--text);font-size:14px;outline:none;margin:5px 0;transition:.2s}
.modal-input:focus{border-color:var(--pink)}
.modal-btn{width:100%;padding:14px;background:var(--pink);color:#fff;border:none;border-radius:16px;font-weight:600;cursor:pointer;margin-top:10px;font-size:14px;transition:.2s}
.modal-btn:hover{background:#c2185b}
.modal-btn.red{background:#e74c3c}.modal-btn.red:hover{background:#c0392b}
.modal-btn.ghost{background:transparent;color:var(--pink);border:2px solid var(--pink)}.modal-btn.ghost:hover{background:#fff5f8}
.modal-close{float:right;color:var(--sub);cursor:pointer;background:none;border:none;font-size:24px;line-height:1}
.modal-err{color:#e74c3c;font-size:11px;text-align:center;min-height:16px;margin-top:4px}
.modal-link{text-align:center;margin-top:12px;font-size:12px;color:var(--sub)}.modal-link a{color:var(--pink);font-weight:500}
.admin-box{background:var(--bg);border:2px solid var(--border);border-radius:16px;padding:12px;font-size:11px;max-height:180px;overflow-y:auto;font-family:monospace;color:var(--sub);line-height:1.7}
.admin-row{display:flex;gap:6px}.admin-row input{flex:1}
.hidden{display:none!important}
.empty{text-align:center;padding:50px 30px;color:var(--sub)}.empty h3{color:var(--text);font-size:18px;margin-bottom:6px}.empty p{font-size:13px}
.ads{text-align:center;padding:10px;font-size:10px;color:#b0a0b0;border-top:1px solid var(--border);background:var(--card);letter-spacing:0.3px}
.ads a{color:#c0a0c0;text-decoration:none;font-weight:500}.ads a:hover{color:var(--pink)}
</style>
</head>
<body>
<div class="app">

</div>

<div class="modal" id="logoutModal"><div class="modal-box"><span class="modal-close" onclick="hm('logoutModal')">&times;</span><div class="modal-title">выход</div><div style="text-align:center;color:var(--sub);margin:14px 0;">вы уверены?</div><button class="modal-btn red" onclick="lo()">подтверждаю</button><button class="modal-btn ghost" onclick="hm('logoutModal')" style="margin-top:6px;">отмена</button></div></div>
